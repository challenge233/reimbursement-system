<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>报销信息收集系统 | 填写入口</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #eef2f7 0%, #dce5ec 100%);
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            padding: 2rem 1rem;
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 1.75rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            margin-bottom: 2rem;
        }

        .card-header {
            background: #1e3a5f;
            color: white;
            padding: 1.4rem 2rem;
        }

        .card-header h1 {
            font-size: 1.6rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .card-header p {
            margin-top: 0.4rem;
            opacity: 0.85;
            font-size: 0.9rem;
        }

        .card-body {
            padding: 2rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
        }

        .form-group {
            margin-bottom: 0.25rem;
        }

        .full-width {
            grid-column: span 2;
        }

        label {
            display: block;
            font-weight: 600;
            color: #1f2d3d;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .required:after {
            content: " *";
            color: #e03a3a;
        }

        input, select, textarea {
            width: 100%;
            padding: 0.8rem 1rem;
            font-size: 0.95rem;
            border: 1.5px solid #e2e8f0;
            border-radius: 1rem;
            background: #fff;
            transition: all 0.2s;
            font-family: inherit;
            outline: none;
        }

        input:focus, select:focus, textarea:focus {
            border-color: #1e3a5f;
            box-shadow: 0 0 0 3px rgba(30, 58, 95, 0.15);
        }

        textarea {
            resize: vertical;
            min-height: 85px;
        }

        .count-hint {
            font-size: 0.7rem;
            color: #5b6e8c;
            margin-top: 0.3rem;
        }

        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-top: 1.8rem;
            justify-content: flex-start;
        }

        .btn {
            border: none;
            font-weight: 600;
            padding: 0.75rem 1.8rem;
            border-radius: 2rem;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            background: #eef2f6;
            color: #1f2d3d;
        }

        .btn-primary {
            background: #1e3a5f;
            color: white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .btn-primary:hover {
            background: #0f2b48;
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: #f1f5f9;
            border: 1px solid #cbd5e1;
        }

        .btn-secondary:hover {
            background: #e6edf4;
        }

        .btn-danger {
            background: #fee2e2;
            color: #b91c1c;
        }

        .btn-danger:hover {
            background: #fecaca;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #cbd5e1;
        }

        .admin-section {
            display: none;
        }

        .admin-section.visible {
            display: block;
        }

        .summary-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 1.2rem;
            gap: 1rem;
        }

        .summary-header h2 {
            font-size: 1.4rem;
            font-weight: 600;
            color: #0f2b3f;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .badge-count {
            background: #1e3a5f;
            color: white;
            border-radius: 40px;
            padding: 0.2rem 0.8rem;
            font-size: 0.8rem;
        }

        .table-wrapper {
            overflow-x: auto;
            border-radius: 1.2rem;
            border: 1px solid #e9edf2;
            background: white;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        th {
            background: #f8fafc;
            padding: 1rem 0.8rem;
            text-align: left;
            font-weight: 600;
            color: #1e2f3e;
            border-bottom: 1px solid #e2e8f0;
        }

        td {
            padding: 0.85rem 0.8rem;
            border-bottom: 1px solid #ecf3f9;
            word-break: break-word;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .empty-row td {
            text-align: center;
            color: #8ba0b5;
            padding: 2.5rem;
        }

        .delete-btn, .edit-btn {
            background: none;
            border: none;
            font-size: 1.1rem;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 30px;
            margin: 0 2px;
        }

        .delete-btn {
            color: #b91c1c;
        }

        .delete-btn:hover {
            background: #fee2e2;
        }

        .edit-btn {
            color: #2c5f8a;
        }

        .edit-btn:hover {
            background: #e6f0f9;
        }

        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .login-modal {
            background: white;
            border-radius: 2rem;
            padding: 2rem;
            width: 90%;
            max-width: 380px;
            box-shadow: 0 30px 40px rgba(0,0,0,0.2);
            text-align: center;
        }

        .login-modal h3 {
            margin-bottom: 1rem;
            color: #1e3a5f;
            font-size: 1.5rem;
        }

        .login-modal input {
            width: 100%;
            padding: 0.9rem;
            margin: 1rem 0;
            border: 1.5px solid #e2e8f0;
            border-radius: 1rem;
            font-size: 1rem;
        }

        .login-modal button {
            width: 100%;
            padding: 0.85rem;
            background: #1e3a5f;
            color: white;
            border: none;
            border-radius: 2rem;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
        }

        .admin-bar {
            background: #2c3e50;
            color: white;
            padding: 0.6rem 1.5rem;
            border-radius: 2rem;
            display: inline-flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
            font-size: 0.85rem;
        }

        .admin-bar a {
            color: #ffd966;
            text-decoration: none;
            cursor: pointer;
        }

        .refresh-bar {
            display: flex;
            gap: 0.6rem;
            align-items: center;
            flex-wrap: wrap;
        }

        footer {
            text-align: center;
            font-size: 0.75rem;
            color: #5b6f84;
            margin-top: 2rem;
        }

        @media (max-width: 700px) {
            .card-body {
                padding: 1.5rem;
            }
            .form-grid {
                grid-template-columns: 1fr;
                gap: 1rem;
            }
            .full-width {
                grid-column: span 1;
            }
            .action-buttons {
                flex-direction: column;
            }
            .btn {
                text-align: center;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="card-header">
            <h1>📝 报销信息收集表</h1>
            <p>请如实填写以下信息，提交后将统一汇总至后台管理员处</p>
        </div>
        <div class="card-body">
            <form id="expenseForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label class="required">姓名</label>
                        <input type="text" id="fullName" placeholder="例：张明" autocomplete="off" required>
                    </div>
                    <div class="form-group">
                        <label class="required">部门</label>
                        <input type="text" id="department" placeholder="例：财务部" autocomplete="off" required>
                    </div>
                    <div class="form-group">
                        <label class="required">岗位</label>
                        <input type="text" id="position" placeholder="例：会计主管" autocomplete="off" required>
                    </div>
                    <div class="form-group">
                        <label class="required">未报销次数</label>
                        <input type="number" id="unreimbursedCount" min="0" value="0" step="1" required>
                        <div class="count-hint">单位：次（指当前未完成报销的次数）</div>
                    </div>
                    <div class="form-group full-width">
                        <label class="required">未报销原因</label>
                        <textarea id="unreimbursedReason" placeholder="请详细描述未报销原因，如：发票遗失、超期未报、流程卡在审批..." required></textarea>
                    </div>
                </div>
                <div class="action-buttons">
                    <button type="submit" class="btn btn-primary">✓ 提交报销信息</button>
                    <button type="button" class="btn btn-secondary" id="resetFormBtn">⟳ 清空表单</button>
                </div>
            </form>
        </div>
    </div>

    <div id="adminSection" class="admin-section">
        <div class="card">
            <div class="card-header" style="background: #2c3e50;">
                <h1>🔐 统一汇总后台</h1>
                <p>所有用户填写的数据统一存储，支持增删改查操作</p>
            </div>
            <div class="card-body">
                <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 1rem;">
                    <div class="admin-bar">
                        <span>👑 管理员模式</span>
                        <a id="logoutBtn" style="color:#ffaa66;">🚪 退出后台</a>
                    </div>
                    <div class="refresh-bar">
                        <button id="refreshTableBtn" class="btn btn-outline">🔄 刷新数据</button>
                        <button id="exportCsvBtn" class="btn btn-outline">📎 导出CSV</button>
                        <button id="deleteAllBtn" class="btn btn-danger" style="background:#fee2e2;">⚠️ 清空全部</button>
                    </div>
                </div>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr><th>ID</th><th>姓名</th><th>部门</th><th>岗位</th><th>未报销次数</th><th>未报销原因</th><th>提交时间</th><th>操作</th></tr>
                        </thead>
                        <tbody id="tableBody">
                            <tr class="empty-row"><td colspan="8">加载中...</td></tr>
                        </tbody>
                    </table>
                </div>
                <div style="margin-top: 1rem; font-size: 0.7rem; background: #f0f4fa; padding: 0.6rem 1rem; border-radius: 1rem; color: #2c5282;">
                    💡 提示：数据统一存储于云端数据库，所有提交记录汇总于此。
                </div>
            </div>
        </div>
    </div>
    <footer>
        📌 填写人仅可见上方表单 | 管理员点击右下角按钮进入后台管理
        <span id="adminTriggerBtn" style="display: inline-block; margin-left: 12px; background: #2c3e50; color: white; padding: 4px 12px; border-radius: 30px; font-size: 0.7rem; cursor: pointer;">🔑 管理员入口</span>
    </footer>
</div>

<div id="loginModal" class="login-overlay" style="display: none;">
    <div class="login-modal">
        <h3>🔐 管理员登录</h3>
        <p style="color:#5b6f84; margin-bottom: 0.5rem;">输入密码进入后台</p>
        <input type="password" id="adminPassword" placeholder="请输入管理员密码" autocomplete="off">
        <button id="loginConfirmBtn">确认登录</button>
        <button id="loginCancelBtn" style="margin-top: 0.8rem; background:#eef2f6; color:#333;">取消</button>
    </div>
</div>

<script>
    // ======================= 自动获取当前域名 =======================
    // 自动检测当前访问的域名，无需手动修改
    const API_BASE_URL = window.location.origin;
    const API_ENDPOINT = `${API_BASE_URL}/records`;
    
    const ADMIN_PASSWORD = "admin123";
    
    let backendAvailable = true;
    let isAdminLoggedIn = false;
    
    const form = document.getElementById('expenseForm');
    const fullNameInput = document.getElementById('fullName');
    const departmentInput = document.getElementById('department');
    const positionInput = document.getElementById('position');
    const unreimbursedCountInput = document.getElementById('unreimbursedCount');
    const unreimbursedReasonInput = document.getElementById('unreimbursedReason');
    const resetFormBtn = document.getElementById('resetFormBtn');
    const tableBody = document.getElementById('tableBody');
    const adminSection = document.getElementById('adminSection');
    const loginModal = document.getElementById('loginModal');
    const adminTriggerBtn = document.getElementById('adminTriggerBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const refreshBtn = document.getElementById('refreshTableBtn');
    const exportCsvBtn = document.getElementById('exportCsvBtn');
    const deleteAllBtn = document.getElementById('deleteAllBtn');
    
    async function fetchRecords() {
        try {
            const response = await fetch(API_ENDPOINT);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            data.sort((a,b) => new Date(b.submitTime) - new Date(a.submitTime));
            return data;
        } catch (err) {
            console.error(err);
            backendAvailable = false;
            if (tableBody) tableBody.innerHTML = '<tr class="empty-row"><td colspan="8">❌ 连接服务器失败，请刷新重试</td></tr>';
            return [];
        }
    }
    
    async function renderAdminTable() {
        if (!isAdminLoggedIn) return;
        if (tableBody) tableBody.innerHTML = '<tr class="empty-row"><td colspan="8">⏳ 加载中...</td></tr>';
        const records = await fetchRecords();
        const totalSpan = document.getElementById('totalCount');
        if (records.length === 0) {
            if (tableBody) tableBody.innerHTML = '<tr class="empty-row"><td colspan="8">✨ 暂无数据，快填写第一条报销信息吧！</td></tr>';
            if (totalSpan) totalSpan.innerText = '0';
            return;
        }
        if (totalSpan) totalSpan.innerText = records.length;
        let html = '';
        records.forEach((record, idx) => {
            html += `
                <tr>
                    <td style="font-size:0.7rem;">${String(record.id).slice(0,8)}</td>
                    <td><strong>${escapeHtml(record.name)}</strong></td>
                    <td>${escapeHtml(record.department)}</td>
                    <td>${escapeHtml(record.position)}</td>
                    <td style="text-align:center;">${record.unreimbursedCount ?? 0} 次</td>
                    <td style="max-width:260px;">${escapeHtml(record.unreimbursedReason)}</td>
                    <td style="font-size:0.7rem;">${new Date(record.submitTime).toLocaleString()}</td>
                    <td>
                        <button class="edit-btn" data-id="${record.id}">✏️</button>
                        <button class="delete-btn" data-id="${record.id}">🗑️</button>
                    </td>
                </table>
            `;
        });
        if (tableBody) tableBody.innerHTML = html;
        
        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                const id = btn.getAttribute('data-id');
                if (confirm('确定删除吗？')) {
                    await fetch(`${API_ENDPOINT}/${id}`, { method: 'DELETE' });
                    await renderAdminTable();
                }
            });
        });
        
        document.querySelectorAll('.edit-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                const id = btn.getAttribute('data-id');
                const res = await fetch(`${API_ENDPOINT}/${id}`);
                const record = await res.json();
                const newName = prompt('修改姓名', record.name);
                if (newName === null) return;
                const newDept = prompt('修改部门', record.department);
                const newPos = prompt('修改岗位', record.position);
                const newCount = prompt('修改未报销次数', record.unreimbursedCount);
                const newReason = prompt('修改未报销原因', record.unreimbursedReason);
                await fetch(`${API_ENDPOINT}/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        ...record,
                        name: newName, department: newDept, position: newPos,
                        unreimbursedCount: parseInt(newCount) || 0, unreimbursedReason: newReason
                    })
                });
                await renderAdminTable();
            });
        });
    }
    
    async function addNewRecord(data) {
        const newItem = {
            name: data.name, department: data.department, position: data.position,
            unreimbursedCount: data.unreimbursedCount, unreimbursedReason: data.unreimbursedReason,
            submitTime: new Date().toISOString(), id: Date.now() + '-' + Math.random()
        };
        try {
            const response = await fetch(API_ENDPOINT, {
                method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(newItem)
            });
            return response.ok;
        } catch (err) {
            alert('提交失败: ' + err.message);
            return false;
        }
    }
    
    function getFormDataValid() {
        const name = fullNameInput.value.trim();
        const department = departmentInput.value.trim();
        const position = positionInput.value.trim();
        const count = parseInt(unreimbursedCountInput.value);
        const reason = unreimbursedReasonInput.value.trim();
        if (!name) { alert('请填写姓名'); return null; }
        if (!department) { alert('请填写部门'); return null; }
        if (!position) { alert('请填写岗位'); return null; }
        if (isNaN(count) || count < 0) { alert('未报销次数必须为大于等于0的数字'); return null; }
        if (!reason) { alert('请填写未报销原因'); return null; }
        return { name, department, position, unreimbursedCount: count, unreimbursedReason: reason };
    }
    
    async function onSubmit(e) {
        e.preventDefault();
        const formData = getFormDataValid();
        if (!formData) return;
        if (await addNewRecord(formData)) {
            alert(`✅ 提交成功！${formData.name} 的报销信息已存入统一后台。`);
            resetFormFields();
            if (isAdminLoggedIn) await renderAdminTable();
        } else alert('提交失败，请重试');
    }
    
    function resetFormFields() {
        fullNameInput.value = '';
        departmentInput.value = '';
        positionInput.value = '';
        unreimbursedCountInput.value = '0';
        unreimbursedReasonInput.value = '';
        fullNameInput.focus();
    }
    
    async function exportToCSV() {
        const records = await fetchRecords();
        if (!records.length) { alert('没有数据'); return; }
        const headers = ['ID', '姓名', '部门', '岗位', '未报销次数', '未报销原因', '提交时间'];
        const rows = records.map(r => [r.id, r.name, r.department, r.position, r.unreimbursedCount, r.unreimbursedReason, r.submitTime]);
        const csvLines = [headers, ...rows].map(row => row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(','));
        const blob = new Blob(["\uFEFF" + csvLines.join('\n')], { type: 'text/csv' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `reimbursement_${new Date().toISOString().slice(0,19)}.csv`;
        link.click();
        URL.revokeObjectURL(link.href);
    }
    
    async function deleteAllRecords() {
        if (!confirm('⚠️ 删除所有记录，不可恢复！')) return;
        const records = await fetchRecords();
        for (let r of records) await fetch(`${API_ENDPOINT}/${r.id}`, { method: 'DELETE' });
        await renderAdminTable();
        alert('已清空');
    }
    
    function showAdminPanel() { isAdminLoggedIn = true; adminSection.classList.add('visible'); renderAdminTable(); }
    function hideAdminPanel() { isAdminLoggedIn = false; adminSection.classList.remove('visible'); }
    function openLoginModal() { loginModal.style.display = 'flex'; document.getElementById('adminPassword').value = ''; }
    function closeLoginModal() { loginModal.style.display = 'none'; }
    function attemptLogin() {
        if (document.getElementById('adminPassword').value === ADMIN_PASSWORD) {
            closeLoginModal(); showAdminPanel();
        } else { alert('密码错误'); }
    }
    function logout() { if (confirm('退出后台吗？')) hideAdminPanel(); }
    
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
    
    form.addEventListener('submit', onSubmit);
    resetFormBtn.addEventListener('click', (e) => { e.preventDefault(); resetFormFields(); });
    if (refreshBtn) refreshBtn.addEventListener('click', () => { if(isAdminLoggedIn) renderAdminTable(); });
    if (exportCsvBtn) exportCsvBtn.addEventListener('click', exportToCSV);
    if (deleteAllBtn) deleteAllBtn.addEventListener('click', deleteAllRecords);
    if (adminTriggerBtn) adminTriggerBtn.addEventListener('click', openLoginModal);
    if (logoutBtn) logoutBtn.addEventListener('click', logout);
    document.getElementById('loginConfirmBtn')?.addEventListener('click', attemptLogin);
    document.getElementById('loginCancelBtn')?.addEventListener('click', closeLoginModal);
    
    hideAdminPanel();
    console.log('API地址:', API_ENDPOINT);
</script>
</body>
</html>
